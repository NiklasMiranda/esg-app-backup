version: '3.9'

services:

  backend:
    build:
      context: ./backend
    container_name: django_backend

    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "

    volumes:
      - ./backend:/app

    environment:
      DJANGO_SETTINGS_MODULE: esg_api.settings.dev

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
    container_name: react_frontend

    volumes:
      - .:/app
      - /app/node_modules

    ports:
      - "3000:3000"

    stdin_open: true

    depends_on:
      - backend

  db:
    image: postgres:17
    container_name: postgres_db

    restart: always

    environment:
      POSTGRES_DB: esgdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

      - ./postgres/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: